<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shoplox - Home</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-links">
        <a th:href="@{/}">SHOPLOX</a>
        <a th:href="@{/view/customers}">Clientes</a>
        <a th:href="@{/view/products}">Productos</a>
        <a th:href="@{/view/sales}">Ventas</a>
        <a th:href="@{/view/saledetails}">Detalles</a> <!-- NUEVO ENLACE -->
        <a th:href="@{/view/users}">Usuarios</a>
    </div>
    <div class="nav-login-mini">
        <span>¡Hola, Admin!</span>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-small btn-logout">Log Out</button>
        </form>
    </div>
</nav>

<div class="filter-bar">
    <h1>Products</h1>
    <div class="filter-group">
        <label>Filter By:</label>
        <select id="sel-filter">
            <option value="default">Default</option>
            <option value="az">Nombre A-Z</option>
            <option value="price-asc">Precio: menor a mayor</option>
            <option value="price-desc">Precio: mayor a menor</option>
            <option value="stock">Más stock</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Status:</label>
        <select id="sel-status">
            <option value="all">All</option>
            <option value="1">Activo</option>
            <option value="0">Inactivo</option>
        </select>
    </div>
    <div class="filter-search">
        <input type="text" id="search-input" placeholder="Search...">
        <button onclick="filterCards()">🔍</button>
    </div>
</div>

<div class="page-main">

    <!-- Popular -->
    <div class="section">
        <div class="section-header">
            <h2>Popular</h2>
            <a th:href="@{/view/products}" class="btn-see-all">See All</a>
        </div>
        <div class="items-grid" id="grid-popular">
            <a class="game-card" th:each="p, i : ${products}" th:if="${i.index < 6}"
               th:href="@{/view/products}"
               th:data-name="${p.productName}"
               th:data-price="${p.price}"
               th:data-stock="${p.stock}"
               th:data-status="${p.status}">
                <div class="game-card-placeholder">📦</div>
                <div class="game-card-info">
                    <div class="game-card-name" th:text="${p.productName}">Nombre</div>
                    <div class="game-card-meta">
                        Q<span th:text="${p.price}">0.00</span>
                        &bull; Stock: <span th:text="${p.stock}">0</span>
                        &bull; <span th:classappend="${p.status == 1 ? 'dot-activo' : 'dot-inactivo'}" class="dot"
                                     th:text="${p.status == 1 ? 'Activo' : 'Inactivo'}"></span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Top Earning -->
    <div class="section">
        <div class="section-header">
            <h2>Top Earning</h2>
            <a th:href="@{/view/products}" class="btn-see-all">See All</a>
        </div>
        <div class="items-grid">
            <a class="game-card" th:each="p, i : ${products}" th:if="${i.index >= 6 and i.index < 12}"
               th:href="@{/view/products}">
                <div class="game-card-placeholder">🏷️</div>
                <div class="game-card-info">
                    <div class="game-card-name" th:text="${p.productName}">Producto</div>
                    <div class="game-card-meta">Q<span th:text="${p.price}">0</span> &bull; Stock: <span th:text="${p.stock}">0</span></div>
                </div>
            </a>
        </div>
    </div>

    <!-- Top Paid -->
    <div class="section">
        <div class="section-header">
            <h2>Top Paid</h2>
            <a th:href="@{/view/products}" class="btn-see-all">See All</a>
        </div>
        <div class="items-grid">
            <a class="game-card" th:each="p, i : ${products}" th:if="${i.index >= 12 and i.index < 18}"
               th:href="@{/view/products}">
                <div class="game-card-placeholder">⭐</div>
                <div class="game-card-info">
                    <div class="game-card-name" th:text="${p.productName}">Producto</div>
                    <div class="game-card-meta">Q<span th:text="${p.price}">0</span> &bull; Stock: <span th:text="${p.stock}">0</span></div>
                </div>
            </a>
        </div>
    </div>

    <!-- Top Rated -->
    <div class="section">
        <div class="section-header">
            <h2>Top Rated</h2>
            <a th:href="@{/view/products}" class="btn-see-all">See All</a>
        </div>
        <div class="items-grid">
            <a class="game-card" th:each="p, i : ${products}" th:if="${i.index >= 18 and i.index < 24}"
               th:href="@{/view/products}">
                <div class="game-card-placeholder">🏆</div>
                <div class="game-card-info">
                    <div class="game-card-name" th:text="${p.productName}">Producto</div>
                    <div class="game-card-meta">Q<span th:text="${p.price}">0</span> &bull; Stock: <span th:text="${p.stock}">0</span></div>
                </div>
            </a>
        </div>
    </div>

</div>

<script th:src="@{/js/main.js}"></script>
<script>
    function filterCards() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const status = document.getElementById('sel-status').value;
        document.querySelectorAll('.game-card').forEach(card => {
            const name = (card.dataset.name || '').toLowerCase();
            const s = card.dataset.status;
            const matchName = name.includes(q);
            const matchStatus = status === 'all' || s === status;
            card.style.display = (matchName && matchStatus) ? 'block' : 'none';
        });
    }
    document.getElementById('search-input').addEventListener('keyup', filterCards);
    document.getElementById('sel-status').addEventListener('change', filterCards);
    document.getElementById('sel-filter').addEventListener('change', function() {
        const val = this.value;
        document.querySelectorAll('.items-grid').forEach(grid => {
            const cards = Array.from(grid.querySelectorAll('.game-card'));
            cards.sort((a, b) => {
                if (val === 'az') return (a.dataset.name||'').localeCompare(b.dataset.name||'');
                if (val === 'price-asc') return parseFloat(a.dataset.price||0) - parseFloat(b.dataset.price||0);
                if (val === 'price-desc') return parseFloat(b.dataset.price||0) - parseFloat(a.dataset.price||0);
                if (val === 'stock') return parseInt(b.dataset.stock||0) - parseInt(a.dataset.stock||0);
                return 0;
            });
            cards.forEach(c => grid.appendChild(c));
        });
    });
</script>
</body>
</html>
