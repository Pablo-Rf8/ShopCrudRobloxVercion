<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shoplox - Editar Cliente</title>
    <link rel="stylesheet" th:href="@{/css/vistas.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a th:href="@{/}">SHOPLOX</a>
        <a th:href="@{/view/customers}" class="active">Clientes</a>
    </div>
</nav>

<div class="vista-container">
    <h2 class="vista-title">Configuración de Cliente</h2>
    <div class="panel" style="max-width: 500px; margin: 0 auto;">
        <h3>Editar Información</h3>
        <form th:action="@{/view/customers/add}" th:object="${customer}" method="post">
            <div class="form-group" style="margin-bottom: 15px;">
                <label>DPI (No editable)</label>
                <input type="number" th:field="*{customerDpi}" readonly style="background: #eee;"/>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Nombre</label>
                <input type="text" th:field="*{firstName}" required />
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Apellido</label>
                <input type="text" th:field="*{lastName}" required />
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Dirección</label>
                <input type="text" th:field="*{address}" />
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Estado (1 Activo / 0 Inactivo)</label>
                <input type="number" th:field="*{status}" required />
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn-primary" style="flex: 1;">Guardar Cambios</button>
                <a th:href="@{/view/customers}" class="btn-danger" style="flex: 1; text-align: center; text-decoration: none; line-height: 25px;">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
