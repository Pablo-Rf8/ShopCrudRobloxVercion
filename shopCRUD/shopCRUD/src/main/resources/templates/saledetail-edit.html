<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shoplox - Editar Detalle</title>
    <link rel="stylesheet" th:href="@{/css/vistas.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a th:href="@{/}">SHOPLOX</a>
        <a th:href="@{/view/customers}">Clientes</a>
        <a th:href="@{/view/products}">Productos</a>
        <a th:href="@{/view/sales}">Ventas</a>
        <a th:href="@{/view/saledetails}" class="active">Detalles</a>
        <a th:href="@{/view/users}">Usuarios</a>
    </div>
    <div class="nav-login-mini">
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-small btn-logout">Log Out</button>
        </form>
    </div>
</nav>

<div class="vista-container">
    <h2 class="vista-title">Editar Detalle de Venta</h2>
    <div class="panel">
        <h3>Modificar Datos</h3>
        <form th:action="@{/view/saledetails/edit/{id}(id=${saleDetail.detailId})}" th:object="${saleDetail}" method="post">
            <div class="form-row">
                <div class="form-group" style="max-width:120px;">
                    <label>ID Detalle</label>
                    <input type="number" th:field="*{detailId}" readonly style="background:#f5f5f5;"/>
                </div>
                <div class="form-group">
                    <label>Venta (ID)</label>
                    <select th:field="*{saleId}" required>
                        <option value="">-- Seleccionar Venta --</option>
                        <option th:each="s : ${sales}" th:value="${s.saleId}" th:text="'Venta #' + ${s.saleId}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Producto</label>
                    <select th:field="*{productId}" required>
                        <option value="">-- Seleccionar Producto --</option>
                        <option th:each="p : ${products}" th:value="${p.productId}" th:text="${p.productName}"></option>
                    </select>
                </div>
                <div class="form-group" style="max-width:130px;">
                    <label>Cantidad</label>
                    <input type="number" th:field="*{quantity}" min="1" required />
                </div>
                <div class="form-group" style="max-width:150px;">
                    <label>Precio Unit. (Q)</label>
                    <input type="number" step="0.01" th:field="*{unitPrice}" required />
                </div>
            </div>

            <div style="margin-top:16px; display:flex; gap:10px;">
                <button type="submit" class="btn-primary">Guardar Cambios</button>
                <a th:href="@{/view/saledetails}" class="btn-danger" style="text-decoration:none; padding:9px 20px; display:inline-block;">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
