<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shoplox - Ventas</title>
    <link rel="stylesheet" th:href="@{/css/vistas.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a th:href="@{/}">SHOPLOX</a>
        <a th:href="@{/view/customers}">Clientes</a>
        <a th:href="@{/view/products}">Productos</a>
        <a th:href="@{/view/sales}">Ventas</a>
        <a th:href="@{/view/saledetails}">Detalles</a> <!-- NUEVO ENLACE -->
        <a th:href="@{/view/users}">Usuarios</a>
    </div>
    <div class="nav-login-mini">
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-small btn-logout">Log Out</button>
        </form>
    </div>
</nav>

<div class="vista-container">
    <h2 class="vista-title">Ventas</h2>

    <!-- Formulario nueva venta -->
    <div class="panel">
        <h3>Registrar Nueva Venta</h3>
        <form th:action="@{/view/sales/add}" th:object="${sale}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Cliente (DPI)</label>
                    <select th:field="*{customerDpi}" required>
                        <option value="">-- Seleccionar --</option>
                        <option th:each="c : ${customers}"
                                th:value="${c.customerDpi}"
                                th:text="${c.firstName + ' ' + c.lastName + ' — ' + c.customerDpi}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Producto</label>
                    <select th:field="*{productId}" required>
                        <option value="">-- Seleccionar --</option>
                        <option th:each="p : ${products}"
                                th:value="${p.productId}"
                                th:text="${p.productName + ' — Q' + p.price}">
                        </option>
                    </select>
                </div>
                <div class="form-group" style="max-width:130px;">
                    <label>Cantidad</label>
                    <input type="number" th:field="*{quantity}" placeholder="0" min="1" required />
                </div>
                <div class="form-group" style="max-width:150px;">
                    <label>Total (Q)</label>
                    <input type="number" step="0.01" th:field="*{total}" placeholder="0.00" required />
                </div>
                <button type="submit" class="btn-primary">Registrar</button>
            </div>
        </form>
    </div>

    <!-- Tabla de ventas -->
    <div class="panel">
        <h3>Historial de Ventas</h3>
        <div class="tabla-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID Venta</th>
                    <th>Cliente (DPI)</th>
                    <th>Producto (ID)</th>
                    <th>Cantidad</th>
                    <th>Total</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${sales}">
                    <td th:text="${s.saleId}"></td>
                    <td th:text="${s.customerDpi}"></td>
                    <td th:text="${s.productId}"></td>
                    <td th:text="${s.quantity}"></td>
                    <td th:text="'Q' + ${s.total}"></td>
                    <td th:text="${s.saleDate}">-</td>
                    <td>
                        <a th:href="@{/view/sales/edit/{id}(id=${s.saleId})}"
                           class="btn-primary"
                           style="background-color:#f6b211; padding:5px 10px; font-size:12px; text-decoration:none;">Editar</a>
                        <a th:href="@{/view/sales/delete/{id}(id=${s.saleId})}"
                           class="btn-danger"
                           style="text-decoration:none; padding:5px 10px; font-size:12px;"
                           onclick="return confirm('¿Eliminar esta venta?')">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
