<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shoplox - Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/vistas.css}">
    <!-- Agregamos home.css para heredar los estilos de la filter-bar -->
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a th:href="@{/}">SHOPLOX</a>
        <a th:href="@{/view/customers}">Clientes</a>
        <a th:href="@{/view/products}">Productos</a>
        <a th:href="@{/view/sales}">Ventas</a>
        <a th:href="@{/view/saledetails}">Detalles</a> <!-- NUEVO ENLACE -->
        <a th:href="@{/view/users}">Usuarios</a>
    </div>
    <div class="nav-login-mini">
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-small btn-logout">Log Out</button>
        </form>
    </div>
</nav>

<!-- Barra de Filtro / Búsqueda para el CRUD -->
<div class="filter-bar">
    <h1>Usuarios</h1>
    <div class="filter-search">
        <input type="text" id="table-search" placeholder="Buscar en la tabla...">
        <button type="button">🔍</button>
    </div>
</div>

<div class="vista-container">
    <div class="panel">
        <h3>Crear Nuevo Usuario</h3>
        <form th:action="@{/view/users/add}" th:object="${user}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" placeholder="Nombre de usuario" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" placeholder="****" required />
                </div>
                <div class="form-group" style="max-width:130px;">
                    <label>Estado (1/0)</label>
                    <input type="number" th:field="*{status}" placeholder="1" required />
                </div>
                <button type="submit" class="btn-primary">Registrar</button>
            </div>
        </form>
    </div>
    <div class="panel">
        <h3>Usuarios del Sistema</h3>
        <div class="tabla-wrapper">
            <table id="crud-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.userId}"></td>
                    <td th:text="${u.username}"></td>
                    <td>
                        <span th:classappend="${u.status == 1 ? 'badge-activo' : 'badge-inactivo'}"
                              class="badge"
                              th:text="${u.status == 1 ? 'Activo' : 'Inactivo'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/view/users/edit/{id}(id=${u.userId})}"
                           class="btn-primary"
                           style="background-color:#f6b211; padding:5px 10px; font-size:12px; text-decoration:none;">Editar</a>
                        <a th:href="@{/view/users/delete/{id}(id=${u.userId})}"
                           class="btn-danger"
                           style="padding:5px 10px; font-size:12px; text-decoration:none;"
                           onclick="return confirm('¿Eliminar este usuario?')">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
