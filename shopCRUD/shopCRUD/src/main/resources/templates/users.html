<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shoplox - Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/vistas.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a th:href="@{/}">SHOPLOX</a>
        <a th:href="@{/view/customers}">Clientes</a>
        <a th:href="@{/view/products}">Productos</a>
        <a th:href="@{/view/users}" class="active">Usuarios</a>
    </div>
</nav>

<div class="vista-container">
    <h2 class="vista-title">Administración de Cuentas</h2>
    <div class="panel">
        <h3>Crear Nuevo Usuario</h3>
        <form th:action="@{/view/users/add}" th:object="${user}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" placeholder="Nombre de usuario" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" placeholder="****" required />
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <input type="number" th:field="*{status}" placeholder="1" required />
                </div>
                <button type="submit" class="btn-primary">Registrar</button>
            </div>
        </form>
    </div>

    <div class="panel">
        <h3>Usuarios del Sistema</h3>
        <div class="tabla-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.userId}"></td>
                    <td th:text="${u.username}"></td>
                    <td><span th:classappend="${u.status == 1 ? 'badge-activo' : 'badge-inactivo'}" class="badge" th:text="${u.status == 1 ? 'Activo' : 'Inactivo'}"></span></td>
                    <td>
                        <a th:href="@{/view/users/delete/{id}(id=${u.userId})}" class="btn-danger" style="text-decoration:none; padding: 5px;">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
