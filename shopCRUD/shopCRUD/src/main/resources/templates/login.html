<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPLOX - Log in</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="style.css">
</head>
<body class="login-background">

<!-- ══ NAVBAR ══ -->
<nav class="navbar">

    <div class="nav-left">
        <div class="nav-logo-icon"></div>
        <a th:href="@{/}" href="#" class="active">Play</a>
        <a href="#">About</a>
        <a href="#">Platforms</a>
    </div>

    <div class="nav-right">
        <div class="nav-right-row">
            <input type="text"     placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="btn-nav-login">Log In</button>
        </div>
        <a href="#" class="nav-forgot">Forgot Username/Password?</a>
    </div>

</nav>

<!-- ══ CONTENIDO ══ -->
<main class="page-content">

    <!-- Logo izquierda — cada letra con skew individual -->
    <div class="logo-section">
        <h1 class="shoplox-title" aria-label="SHOPLOX">
            <span class="logo-letter">S</span>
            <span class="logo-letter">H</span>
            <span class="logo-o"></span>
            <span class="logo-letter">P</span>
            <span class="logo-letter">L</span>
            <span class="logo-o"></span>
            <span class="logo-letter">X</span>
        </h1>
        <p class="logo-tagline">Powering Imagination™</p>
    </div>

    <!-- Panel derecha -->
    <div class="login-panel">
        <p class="login-panel-title">Log in and start having fun!</p>

        <form th:action="@{/login}" action="#" method="post">

            <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    autocomplete="username"
                    required
            />

            <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    autocomplete="current-password"
                    required
            />

            <p class="terms-text">
                By clicking Log In, you are agreeing to the
                <a href="#">Terms of Use</a>.
            </p>

            <button type="submit" class="btn-login-large">Log In</button>

        </form>
    </div>

</main>

<script th:src="@{/js/main.js}" src="main.js"></script>
</body>
</html>
