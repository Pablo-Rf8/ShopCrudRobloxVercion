<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shoplox - Editar Venta</title>
    <link rel="stylesheet" th:href="@{/css/vistas.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a th:href="@{/}">SHOPLOX</a>
        <a th:href="@{/view/customers}">Clientes</a>
        <a th:href="@{/view/products}">Productos</a>
        <a th:href="@{/view/sales}" class="active">Ventas</a>
        <a th:href="@{/view/users}">Usuarios</a>
    </div>
    <div class="nav-login-mini">
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-small btn-logout">Log Out</button>
        </form>
    </div>
</nav>

<div class="vista-container">
    <h2 class="vista-title">Editar Venta</h2>
    <div class="panel">
        <h3>Modificar Datos de la Venta</h3>
        <form th:action="@{/view/sales/edit/{id}(id=${sale.saleId})}" th:object="${sale}" method="post">
            <div class="form-row">
                <div class="form-group" style="max-width:120px;">
                    <label>ID Venta</label>
                    <input type="number" th:field="*{saleId}" readonly style="background:#f5f5f5;"/>
                </div>

                <div class="form-group">
                    <label>Cliente (DPI)</label>
                    <select th:field="*{customerDpi}" required>
                        <option value="">-- Seleccionar --</option>
                        <option th:each="c : ${customers}"
                                th:value="${c.customerDpi}"
                                th:text="${c.firstName + ' ' + c.lastName + ' - ' + c.customerDpi}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Producto</label>
                    <select th:field="*{productId}" required>
                        <option value="">-- Seleccionar --</option>
                        <option th:each="p : ${products}"
                                th:value="${p.productId}"
                                th:text="${p.productName + ' - Q' + p.price}">
                        </option>
                    </select>
                </div>

                <div class="form-group" style="max-width:130px;">
                    <label>Cantidad</label>
                    <input type="number" th:field="*{quantity}" min="1" required />
                </div>

                <div class="form-group" style="max-width:150px;">
                    <label>Total (Q)</label>
                    <input type="number" step="0.01" th:field="*{total}" required />
                </div>
            </div>

            <div style="margin-top:16px; display:flex; gap:10px;">
                <button type="submit" class="btn-primary">Guardar Cambios</button>
                <a th:href="@{/view/sales}" class="btn-danger" style="text-decoration:none; padding:9px 20px; display:inline-block;">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
