<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shoplox - Editar Producto</title>
    <link rel="stylesheet" th:href="@{/css/vistas.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-links">
        <a th:href="@{/}">SHOPLOX</a>
        <a th:href="@{/view/customers}">Clientes</a>
        <a th:href="@{/view/products}" class="active">Productos</a>
        <a th:href="@{/view/sales}">Ventas</a>
        <a th:href="@{/view/users}">Usuarios</a>
    </div>
    <div class="nav-login-mini">
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn-small btn-logout">Log Out</button>
        </form>
    </div>
</nav>

<div class="vista-container">
    <h2 class="vista-title">Editar Producto</h2>
    <div class="panel">
        <h3>Modificar Datos del Producto</h3>
        <form th:action="@{/view/products/edit/{id}(id=${product.productId})}" th:object="${product}" method="post">
            <div class="form-row">
                <div class="form-group" style="max-width:150px;">
                    <label>ID Producto</label>
                    <input type="number" th:field="*{productId}" readonly style="background:#f5f5f5;"/>
                </div>
                <div class="form-group" style="flex:2;">
                    <label>Nombre</label>
                    <input type="text" th:field="*{productName}" required />
                </div>
                <div class="form-group" style="max-width:160px;">
                    <label>Precio (Q)</label>
                    <input type="number" step="0.01" th:field="*{price}" required />
                </div>
                <div class="form-group" style="max-width:130px;">
                    <label>Stock</label>
                    <input type="number" th:field="*{stock}" required />
                </div>
                <div class="form-group" style="max-width:150px;">
                    <label>Estado (1/0)</label>
                    <input type="number" th:field="*{status}" required />
                </div>
            </div>
            <div style="margin-top:16px; display:flex; gap:10px;">
                <button type="submit" class="btn-primary">Guardar Cambios</button>
                <a th:href="@{/view/products}" class="btn-danger" style="text-decoration:none; padding:9px 20px; display:inline-block;">Cancelar</a>
            </div>
        </form>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
